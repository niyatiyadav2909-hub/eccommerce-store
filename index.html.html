<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zest Store</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F5F0;
    --white: #FFFFFF;
    --ink: #1A1A1A;
    --ink-light: #6B6B6B;
    --accent: #E84C1E;
    --accent-light: #FFF0EB;
    --border: #E8E4DC;
    --card: #FFFFFF;
    --tag-bg: #F0EDE8;
    --success: #1A7F4B;
  }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  /* NAV */
  nav {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .nav-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    color: var(--ink);
    letter-spacing: -0.03em;
  }

  .nav-logo span { color: var(--accent); }

  .nav-right { display: flex; align-items: center; gap: 24px; }

  .nav-link {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-light);
    cursor: pointer;
    transition: color 0.15s;
    background: none;
    border: none;
    font-family: 'Inter', sans-serif;
  }

  .nav-link:hover { color: var(--ink); }
  .nav-link.active { color: var(--accent); }

  .cart-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: var(--ink);
    color: white;
    border: none;
    border-radius: 100px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }

  .cart-btn:hover { background: #333; }

  .cart-count {
    background: var(--accent);
    color: white;
    border-radius: 50%;
    width: 18px; height: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 700;
  }

  /* HERO */
  .hero {
    background: var(--ink);
    color: white;
    padding: 64px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 32px;
    overflow: hidden;
    position: relative;
  }

  .hero::after {
    content: 'SALE';
    position: absolute;
    right: -20px;
    top: 50%;
    transform: translateY(-50%) rotate(90deg);
    font-family: 'Syne', sans-serif;
    font-size: 120px;
    font-weight: 800;
    color: #ffffff08;
    letter-spacing: -0.05em;
    pointer-events: none;
  }

  .hero-text { max-width: 500px; }

  .hero-eyebrow {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
  }

  .hero-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(32px, 5vw, 56px);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.03em;
    margin-bottom: 20px;
  }

  .hero-title span { color: var(--accent); }

  .hero-sub {
    font-size: 15px;
    color: #aaa;
    line-height: 1.6;
    margin-bottom: 32px;
  }

  .hero-cta {
    padding: 14px 28px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 100px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s;
  }

  .hero-cta:hover { background: #d43e15; transform: translateY(-1px); }

  .hero-stats {
    display: flex;
    gap: 32px;
    flex-shrink: 0;
  }

  .stat { text-align: center; }
  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 36px;
    font-weight: 800;
    color: white;
  }
  .stat-label { font-size: 12px; color: #888; margin-top: 4px; }

  /* FILTERS */
  .filters-bar {
    padding: 20px 32px;
    background: var(--white);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .filter-label { font-size: 12px; font-weight: 600; color: var(--ink-light); margin-right: 4px; }

  .filter-chip {
    padding: 6px 14px;
    border-radius: 100px;
    border: 1.5px solid var(--border);
    background: transparent;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-light);
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-chip:hover { border-color: var(--ink); color: var(--ink); }
  .filter-chip.active { background: var(--ink); border-color: var(--ink); color: white; }

  /* PRODUCTS */
  .products-section { padding: 40px 32px; }

  .section-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .product-count { font-size: 13px; color: var(--ink-light); }

  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
  }

  .product-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .product-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.08);
  }

  .product-img {
    width: 100%;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 64px;
    position: relative;
    overflow: hidden;
  }

  .product-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    padding: 4px 10px;
    border-radius: 100px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .badge-sale { background: var(--accent); color: white; }
  .badge-new { background: var(--ink); color: white; }
  .badge-hot { background: #F59E0B; color: white; }

  .product-info { padding: 16px; }

  .product-category {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 6px;
  }

  .product-name {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 8px;
    line-height: 1.3;
  }

  .product-rating {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-bottom: 12px;
  }

  .stars { color: #F59E0B; font-size: 11px; }
  .rating-count { font-size: 11px; color: var(--ink-light); }

  .product-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .product-price {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: var(--ink);
  }

  .product-price-old {
    font-size: 12px;
    color: var(--ink-light);
    text-decoration: line-through;
    margin-left: 4px;
    font-weight: 400;
    font-family: 'Inter', sans-serif;
  }

  .add-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--ink);
    color: white;
    border: none;
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, transform 0.1s;
    flex-shrink: 0;
  }

  .add-btn:hover { background: var(--accent); transform: scale(1.1); }
  .add-btn.added { background: var(--success); }

  /* CART SIDEBAR */
  .cart-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .cart-overlay.open { opacity: 1; pointer-events: all; }

  .cart-drawer {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 380px;
    background: var(--white);
    z-index: 201;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    display: flex;
    flex-direction: column;
    box-shadow: -8px 0 40px rgba(0,0,0,0.12);
  }

  .cart-drawer.open { transform: translateX(0); }

  .cart-header {
    padding: 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .cart-title {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
  }

  .close-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--tag-bg);
    border: none;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink);
  }

  .cart-items { flex: 1; overflow-y: auto; padding: 16px 24px; }

  .cart-empty {
    text-align: center;
    padding: 48px 0;
    color: var(--ink-light);
    font-size: 14px;
  }

  .cart-empty-icon { font-size: 48px; margin-bottom: 12px; }

  .cart-item {
    display: flex;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    align-items: center;
  }

  .cart-item-img {
    width: 56px; height: 56px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    flex-shrink: 0;
  }

  .cart-item-info { flex: 1; }

  .cart-item-name {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .cart-item-price { font-size: 13px; color: var(--accent); font-weight: 600; }

  .qty-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
  }

  .qty-btn {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: transparent;
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Inter', sans-serif;
    transition: all 0.15s;
  }

  .qty-btn:hover { border-color: var(--ink); background: var(--ink); color: white; }
  .qty-num { font-size: 13px; font-weight: 600; min-width: 16px; text-align: center; }

  .remove-btn {
    background: none;
    border: none;
    color: var(--ink-light);
    cursor: pointer;
    font-size: 16px;
    padding: 4px;
    transition: color 0.15s;
  }

  .remove-btn:hover { color: var(--accent); }

  .cart-footer {
    padding: 20px 24px;
    border-top: 1px solid var(--border);
  }

  .cart-subtotal {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
    font-size: 13px;
    color: var(--ink-light);
  }

  .cart-total {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
  }

  .checkout-btn {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
    letter-spacing: -0.01em;
  }

  .checkout-btn:hover { background: #d43e15; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink);
    color: white;
    padding: 12px 20px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    z-index: 300;
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ORDER SUCCESS */
  .order-success {
    text-align: center;
    padding: 32px 24px;
  }

  .success-icon { font-size: 56px; margin-bottom: 16px; }

  .success-title {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 8px;
    color: var(--success);
  }

  .success-sub { font-size: 13px; color: var(--ink-light); line-height: 1.6; }

  @media (max-width: 600px) {
    nav { padding: 0 16px; }
    .hero { padding: 40px 16px; flex-direction: column; }
    .hero-stats { display: none; }
    .products-section { padding: 24px 16px; }
    .filters-bar { padding: 16px; }
    .cart-drawer { width: 100%; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useCallback } = React;

const PRODUCTS = [
  { id:1, name:'Wireless Noise-Cancel Headphones', category:'Electronics', price:2499, oldPrice:3999, emoji:'🎧', bg:'#EEF2FF', badge:'sale', rating:4.8, reviews:234 },
  { id:2, name:'Premium Running Sneakers', category:'Footwear', price:1899, oldPrice:null, emoji:'👟', bg:'#FFF7ED', badge:'new', rating:4.6, reviews:89 },
  { id:3, name:'Minimalist Leather Watch', category:'Accessories', price:3299, oldPrice:4500, emoji:'⌚', bg:'#F0FDF4', badge:'hot', rating:4.9, reviews:312 },
  { id:4, name:'Portable Bluetooth Speaker', category:'Electronics', price:1299, oldPrice:1799, emoji:'🔊', bg:'#FDF4FF', badge:'sale', rating:4.5, reviews:156 },
  { id:5, name:'Organic Cotton Hoodie', category:'Clothing', price:899, oldPrice:null, emoji:'👕', bg:'#FFFBEB', badge:'new', rating:4.7, reviews:67 },
  { id:6, name:'Smart Fitness Band', category:'Electronics', price:1599, oldPrice:2199, emoji:'⌚', bg:'#F0F9FF', badge:'sale', rating:4.4, reviews:201 },
  { id:7, name:'Ceramic Coffee Mug Set', category:'Home', price:499, oldPrice:null, emoji:'☕', bg:'#FFF1F2', badge:null, rating:4.8, reviews:445 },
  { id:8, name:'Stainless Steel Water Bottle', category:'Sports', price:699, oldPrice:999, emoji:'🍶', bg:'#F0FDF4', badge:'hot', rating:4.6, reviews:178 },
];

const CATEGORIES = ['All', 'Electronics', 'Footwear', 'Accessories', 'Clothing', 'Home', 'Sports'];

function Stars({ rating }) {
  return <span className="stars">{'★'.repeat(Math.floor(rating))}{'☆'.repeat(5 - Math.floor(rating))}</span>;
}

function App() {
  const [cart, setCart] = useState([]);
  const [cartOpen, setCartOpen] = useState(false);
  const [activeCategory, setActiveCategory] = useState('All');
  const [toast, setToast] = useState('');
  const [toastVisible, setToastVisible] = useState(false);
  const [ordered, setOrdered] = useState(false);
  const [addedIds, setAddedIds] = useState(new Set());

  const showToast = (msg) => {
    setToast(msg);
    setToastVisible(true);
    setTimeout(() => setToastVisible(false), 2000);
  };

  const addToCart = (product) => {
    setCart(prev => {
      const existing = prev.find(i => i.id === product.id);
      if (existing) return prev.map(i => i.id === product.id ? {...i, qty: i.qty + 1} : i);
      return [...prev, {...product, qty: 1}];
    });
    setAddedIds(prev => new Set([...prev, product.id]));
    setTimeout(() => setAddedIds(prev => { const s = new Set(prev); s.delete(product.id); return s; }), 1000);
    showToast(`${product.name.split(' ').slice(0,2).join(' ')} added to cart`);
  };

  const updateQty = (id, delta) => {
    setCart(prev => prev.map(i => i.id === id ? {...i, qty: Math.max(1, i.qty + delta)} : i));
  };

  const removeItem = (id) => {
    setCart(prev => prev.filter(i => i.id !== id));
  };

  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const cartCount = cart.reduce((s, i) => s + i.qty, 0);

  const filtered = activeCategory === 'All' ? PRODUCTS : PRODUCTS.filter(p => p.category === activeCategory);

  const handleCheckout = () => {
    setOrdered(true);
    setTimeout(() => { setCart([]); setOrdered(false); setCartOpen(false); }, 3000);
  };

  return (
    <>
      {/* NAV */}
      <nav>
        <div className="nav-logo">Zest<span>.</span></div>
        <div className="nav-right">
          <button className="nav-link active">Shop</button>
          <button className="nav-link">About</button>
          <button className="nav-link">Deals</button>
          <button className="cart-btn" onClick={() => setCartOpen(true)}>
            🛒 Cart
            {cartCount > 0 && <span className="cart-count">{cartCount}</span>}
          </button>
        </div>
      </nav>

      {/* HERO */}
      <div className="hero">
        <div className="hero-text">
          <div className="hero-eyebrow">🔥 Weekend Sale — Up to 40% off</div>
          <h1 className="hero-title">Shop <span>Smarter</span>,<br/>Live Better.</h1>
          <p className="hero-sub">Handpicked products across electronics, fashion, and lifestyle. Free delivery on orders above ₹999.</p>
          <button className="hero-cta" onClick={() => document.querySelector('.products-section').scrollIntoView({behavior:'smooth'})}>
            Browse Products →
          </button>
        </div>
        <div className="hero-stats">
          <div className="stat"><div className="stat-num">500+</div><div className="stat-label">Products</div></div>
          <div className="stat"><div className="stat-num">50K+</div><div className="stat-label">Customers</div></div>
          <div className="stat"><div className="stat-num">4.8★</div><div className="stat-label">Rating</div></div>
        </div>
      </div>

      {/* FILTERS */}
      <div className="filters-bar">
        <span className="filter-label">Filter:</span>
        {CATEGORIES.map(cat => (
          <button key={cat} className={`filter-chip ${activeCategory === cat ? 'active' : ''}`}
            onClick={() => setActiveCategory(cat)}>{cat}</button>
        ))}
      </div>

      {/* PRODUCTS */}
      <div className="products-section">
        <div className="section-header">
          <h2 className="section-title">{activeCategory === 'All' ? 'All Products' : activeCategory}</h2>
          <span className="product-count">{filtered.length} items</span>
        </div>
        <div className="products-grid">
          {filtered.map(product => (
            <div key={product.id} className="product-card">
              <div className="product-img" style={{background: product.bg}}>
                <span>{product.emoji}</span>
                {product.badge && (
                  <span className={`product-badge badge-${product.badge}`}>
                    {product.badge === 'sale' ? 'Sale' : product.badge === 'new' ? 'New' : '🔥 Hot'}
                  </span>
                )}
              </div>
              <div className="product-info">
                <div className="product-category">{product.category}</div>
                <div className="product-name">{product.name}</div>
                <div className="product-rating">
                  <Stars rating={product.rating} />
                  <span className="rating-count">({product.reviews})</span>
                </div>
                <div className="product-footer">
                  <div>
                    <span className="product-price">₹{product.price.toLocaleString()}</span>
                    {product.oldPrice && <span className="product-price-old">₹{product.oldPrice.toLocaleString()}</span>}
                  </div>
                  <button
                    className={`add-btn ${addedIds.has(product.id) ? 'added' : ''}`}
                    onClick={() => addToCart(product)}
                    title="Add to cart"
                  >
                    {addedIds.has(product.id) ? '✓' : '+'}
                  </button>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* CART OVERLAY */}
      <div className={`cart-overlay ${cartOpen ? 'open' : ''}`} onClick={() => setCartOpen(false)} />

      {/* CART DRAWER */}
      <div className={`cart-drawer ${cartOpen ? 'open' : ''}`}>
        <div className="cart-header">
          <div className="cart-title">Your Cart {cartCount > 0 && `(${cartCount})`}</div>
          <button className="close-btn" onClick={() => setCartOpen(false)}>✕</button>
        </div>

        {ordered ? (
          <div className="order-success">
            <div className="success-icon">🎉</div>
            <div className="success-title">Order Placed!</div>
            <p className="success-sub">Thanks for shopping at Zest! Your order will arrive in 3–5 business days.</p>
          </div>
        ) : (
          <>
            <div className="cart-items">
              {cart.length === 0 ? (
                <div className="cart-empty">
                  <div className="cart-empty-icon">🛒</div>
                  <div>Your cart is empty</div>
                  <div style={{marginTop:8, fontSize:12}}>Add some products to get started!</div>
                </div>
              ) : (
                cart.map(item => (
                  <div key={item.id} className="cart-item">
                    <div className="cart-item-img" style={{background: item.bg}}>{item.emoji}</div>
                    <div className="cart-item-info">
                      <div className="cart-item-name">{item.name}</div>
                      <div className="cart-item-price">₹{(item.price * item.qty).toLocaleString()}</div>
                      <div className="qty-controls">
                        <button className="qty-btn" onClick={() => updateQty(item.id, -1)}>−</button>
                        <span className="qty-num">{item.qty}</span>
                        <button className="qty-btn" onClick={() => updateQty(item.id, 1)}>+</button>
                      </div>
                    </div>
                    <button className="remove-btn" onClick={() => removeItem(item.id)}>✕</button>
                  </div>
                ))
              )}
            </div>

            {cart.length > 0 && (
              <div className="cart-footer">
                <div className="cart-subtotal">
                  <span>Subtotal</span><span>₹{total.toLocaleString()}</span>
                </div>
                <div className="cart-subtotal">
                  <span>Delivery</span><span style={{color:'#1A7F4B'}}>{total >= 999 ? 'Free' : '₹49'}</span>
                </div>
                <div className="cart-total">
                  <span>Total</span>
                  <span>₹{(total >= 999 ? total : total + 49).toLocaleString()}</span>
                </div>
                <button className="checkout-btn" onClick={handleCheckout}>
                  Place Order →
                </button>
              </div>
            )}
          </>
        )}
      </div>

      {/* TOAST */}
      <div className={`toast ${toastVisible ? 'show' : ''}`}>✓ {toast}</div>
    </>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
